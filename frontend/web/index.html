<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroHub // Real-time Collaborative Editor</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&family=Press+Start+2P&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">

<!-- Monaco Loader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>

</head>
<body>

<header class="top-bar">
    <div class="top-bar-left">
        <div class="logo">ZEROHUB</div>
        <div class="room-badge" id="roomBadge">
            <span id="roomCodeDisplay">OFFLINE</span>
        </div>
    </div>
    <div class="top-bar-center">
        <span class="status-dot" id="statusDot"></span>
        <span id="sbConnection">DISCONNECTED</span>
        <span id="diagnosticLatency" class="latency-text">(--ms)</span>
    </div>
    <div class="top-bar-right">
        <span id="activeUserCount" class="user-count">0 USERS</span>
        <select id="themeSelect" class="select-clean">
            <option value="hacker">Hacker Green</option>
            <option value="vs-dark">VS Dark</option>
        </select>
    </div>
</header>

<div class="main-container">
    <!-- Left Sidebar: Controls -->
    <div class="left-sidebar">
        <div class="panel-group">
            <div class="panel-title">Hacker Alias</div>
            <div class="form-group">
                <input id="usernameInput" class="input-clean" value="HackerAnon" placeholder="Alias">
            </div>
        </div>

        <div class="panel-group">
            <div class="panel-title">Room Control</div>
            <button id="createRoomBtn" class="btn-clean btn-accent">CREATE ROOM</button>
            <div class="room-control-row">
                <input id="roomInput" class="input-clean" placeholder="Room Code">
                <button id="joinRoomBtn" class="btn-clean">JOIN</button>
            </div>
            <button id="copyRoomBtn" class="btn-clean">COPY INVITE LINK</button>
        </div>

        <div class="panel-group active-sessions-panel">
            <div class="panel-title">Active Sessions</div>
            <div id="discoveryList">
                <div class="no-rooms-fallback">No active rooms found</div>
            </div>
        </div>
    </div>

    <!-- Center Editor -->
    <div class="editor-container">
        <div class="editor-toolbar">
            <select id="languageSelect" class="select-clean">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="erlang">Erlang</option>
                <option value="rust">Rust</option>
                <option value="cpp">C++</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
            </select>
        </div>
        <div id="editor"></div>
    </div>

    <!-- Right Sidebar (Collaborators) -->
    <div class="right-sidebar">
        <div class="collaborators-section">
            <div class="panel-title">Collaborators</div>
            <div class="collab-list" id="collabList">
                <!-- Populated dynamically -->
            </div>
        </div>
    </div>
</div>

<statusbar>
    <div class="status-left">
        <span id="sbRoom">ROOM: OFFLINE</span>
    </div>
    <div class="status-right">
        <span id="sbLanguage">JS</span>
        <span id="sbUsers">USERS: 0</span>
        <span id="sbPosition">LN 1, COL 1</span>
    </div>
</statusbar>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/app.js?v=2"></script>

</body>
</html>
